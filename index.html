<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root {
  --purple: #6c3fc5;
  --purple-dark: #4a2a8a;
  --purple-light: #a78bfa;
  --gold: #fbbf24;
  --gold-light: #fde68a;
  --blue: #3b82f6;
  --red: #ef4444;
  --bg: #0f0b1e;
  --card: #1a1333;
  --card-hover: #241b45;
  --text: #f1f0f5;
  --text-muted: #a09bb5;
  --radius: 16px;
  --shadow: 0 8px 32px rgba(108,63,197,.25);
}

html { scroll-behavior: smooth }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  overflow-x: hidden;
}

.bg-orbs {
  position: fixed; inset: 0; z-index: 0; pointer-events: none; overflow: hidden;
}
.bg-orbs span {
  position: absolute; border-radius: 50%; filter: blur(100px); opacity: .18; animation: float 20s infinite ease-in-out;
}
.bg-orbs .orb1 { width: 500px; height: 500px; background: var(--purple); top: -10%; left: -5%; }
.bg-orbs .orb2 { width: 400px; height: 400px; background: var(--gold); bottom: -10%; right: -5%; animation-delay: -7s; }
.bg-orbs .orb3 { width: 350px; height: 350px; background: var(--blue); top: 40%; left: 50%; animation-delay: -13s; }

@keyframes float {
  0%,100% { transform: translateY(0) scale(1) }
  50% { transform: translateY(-40px) scale(1.08) }
}

.container {
  position: relative; z-index: 1;
  max-width: 720px; margin: 0 auto; padding: 24px 20px 60px;
  min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center;
}

/* ─── Screens ─── */
.screen { display: none; width: 100%; animation: fadeUp .5s ease; }
.screen.active { display: flex; flex-direction: column; align-items: center; }

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(24px) }
  to { opacity: 1; transform: translateY(0) }
}

/* ─── Start Screen ─── */
.logo-badge {
  width: 100px; height: 100px; border-radius: 50%; display: grid; place-items: center;
  background: linear-gradient(135deg, var(--purple), var(--blue));
  box-shadow: 0 0 40px rgba(108,63,197,.4);
  margin-bottom: 28px; font-size: 52px;
}
h1 {
  font-size: clamp(1.8rem, 5vw, 2.6rem); font-weight: 800; text-align: center;
  line-height: 1.2; margin-bottom: 12px;
}
h1 .highlight {
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.subtitle { color: var(--text-muted); text-align: center; font-size: 1.05rem; max-width: 460px; margin-bottom: 36px; line-height: 1.6 }

.btn {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 16px 40px; border: none; border-radius: 80px; cursor: pointer;
  font-family: inherit; font-weight: 700; font-size: 1.05rem;
  color: var(--bg); background: linear-gradient(135deg, var(--gold), #f59e0b);
  box-shadow: 0 4px 20px rgba(251,191,36,.35);
  transition: transform .2s, box-shadow .2s;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 28px rgba(251,191,36,.5) }
.btn:active { transform: translateY(0) }
.btn svg { width: 20px; height: 20px }

/* ─── Quiz Screen ─── */
.progress-wrap { width: 100%; margin-bottom: 32px }
.progress-info { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: .85rem; color: var(--text-muted) }
.progress-bar { width: 100%; height: 8px; background: rgba(255,255,255,.08); border-radius: 8px; overflow: hidden }
.progress-fill { height: 100%; background: linear-gradient(90deg, var(--purple-light), var(--gold)); border-radius: 8px; transition: width .4s ease }

.question-card {
  width: 100%; background: var(--card); border-radius: var(--radius);
  padding: 36px 28px; box-shadow: var(--shadow); animation: fadeUp .4s ease;
}
.question-num { font-size: .8rem; font-weight: 600; color: var(--purple-light); text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px }
.question-text { font-size: 1.25rem; font-weight: 700; line-height: 1.5; margin-bottom: 28px }

.options { display: flex; flex-direction: column; gap: 12px; width: 100% }
.option-btn {
  width: 100%; padding: 16px 20px; border: 2px solid rgba(255,255,255,.07);
  border-radius: 12px; background: transparent; color: var(--text);
  font-family: inherit; font-size: 1rem; text-align: left; cursor: pointer;
  transition: border-color .2s, background .2s, transform .15s;
}
.option-btn:hover { border-color: var(--purple-light); background: rgba(167,139,250,.08); transform: translateX(4px) }
.option-btn.selected {
  border-color: var(--gold); background: rgba(251,191,36,.1);
  animation: pop .3s ease;
}
@keyframes pop {
  0% { transform: scale(1) }
  50% { transform: scale(1.02) }
  100% { transform: scale(1) }
}

/* ─── Result Screen ─── */
.result-card {
  width: 100%; background: var(--card); border-radius: var(--radius);
  padding: 40px 32px; text-align: center; box-shadow: var(--shadow);
  animation: fadeUp .6s ease;
}
.result-label { font-size: .8rem; font-weight: 600; color: var(--purple-light); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px }
.result-sprite {
  width: 200px; height: 200px; margin: 0 auto 8px;
  display: grid; place-items: center;
  animation: bounce 2s infinite ease-in-out;
}
.result-sprite img {
  width: 100%; height: 100%; object-fit: contain;
  filter: drop-shadow(0 8px 24px rgba(108,63,197,.4));
}
@keyframes bounce {
  0%,100% { transform: translateY(0) }
  50% { transform: translateY(-10px) }
}
.result-name {
  font-size: 2rem; font-weight: 800;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  margin-bottom: 4px;
}
.result-role { font-size: .95rem; color: var(--purple-light); font-weight: 600; margin-bottom: 20px }
.result-desc { color: var(--text-muted); line-height: 1.7; margin-bottom: 28px; font-size: 1rem }

.trait-chips { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-bottom: 32px }
.chip {
  padding: 6px 16px; border-radius: 80px; font-size: .82rem; font-weight: 600;
  background: rgba(167,139,250,.12); color: var(--purple-light); border: 1px solid rgba(167,139,250,.2);
}

.btn-outline {
  display: inline-flex; align-items: center; gap: 8px;
  padding: 14px 32px; border: 2px solid var(--purple-light); border-radius: 80px;
  background: transparent; color: var(--purple-light); font-family: inherit;
  font-weight: 700; font-size: .95rem; cursor: pointer;
  transition: background .2s, color .2s;
}
.btn-outline:hover { background: var(--purple-light); color: var(--bg) }

.share-row { display: flex; gap: 12px; justify-content: center; margin-top: 16px; flex-wrap: wrap }
.share-btn {
  padding: 10px 20px; border-radius: 80px; border: none; cursor: pointer;
  font-family: inherit; font-weight: 600; font-size: .85rem;
  transition: transform .2s;
}
.share-btn:hover { transform: translateY(-2px) }
.share-btn.copy { background: rgba(255,255,255,.1); color: var(--text) }

/* ─── Responsive ─── */
@media (max-width: 500px) {
  .question-card { padding: 28px 20px }
  .result-card { padding: 32px 20px }
}
</style>
</head>
<body>

<div class="bg-orbs">
  <span class="orb1"></span><span class="orb2"></span><span class="orb3"></span>
</div>

<div class="container">

  <!-- START SCREEN -->
  <div id="start" class="screen active">
    <div class="logo-badge">⚡</div>
    <h1>Which <span class="highlight">Pok&eacute;mon UNITE</span> Character Are You?</h1>
    <p class="subtitle">Answer 8 quick questions and discover which Pok&eacute;mon matches your play style, temperament, and vibe.</p>
    <button class="btn" onclick="startQuiz()">
      Let's Go!
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>
    </button>
  </div>

  <!-- QUIZ SCREEN -->
  <div id="quiz" class="screen">
    <div class="progress-wrap">
      <div class="progress-info">
        <span id="prog-label">Question 1 of 10</span>
        <span id="prog-pct">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    </div>
    <div class="question-card" id="question-card"></div>
  </div>

  <!-- RESULT SCREEN -->
  <div id="result" class="screen"></div>

</div>

<script>
const QUESTIONS = [
  {
    text: "Mid-game, your stomach starts growling. Do you leave your teammates stranded to go grab snacks?",
    options: [
      { label: "Absolutely — chips and candy wait for no one 🍫", traits: { speed: 2, attack: 1 } },
      { label: "I'd never! My team needs me right now", traits: { defend: 2, support: 1 } },
      { label: "I'll grab snacks AND play — I can multitask", traits: { balance: 2, speed: 1 } },
      { label: "Only if we're winning by a lot", traits: { attack: 2, balance: 1 } }
    ]
  },
  {
    text: "Be honest — how toxic are you in team chat?",
    options: [
      { label: "I'm spamming \"Thanks!\" sarcastically after every loss", traits: { attack: 2, speed: 1 } },
      { label: "I never say anything negative — good vibes only", traits: { support: 2, defend: 1 } },
      { label: "I'll roast you but in a funny way, no hard feelings", traits: { speed: 2, balance: 1 } },
      { label: "I stay quiet but I'm judging everyone's builds", traits: { defend: 2, balance: 1 } }
    ]
  },
  {
    text: "Your team is losing badly. What's your instinct?",
    options: [
      { label: "Dive in and try to turn the fight around myself", traits: { attack: 2, speed: 1 } },
      { label: "Protect my teammates and hold the line", traits: { defend: 2, support: 1 } },
      { label: "Flank behind the enemy and catch them off guard", traits: { speed: 2, attack: 1 } },
      { label: "Rally the team, heal who I can, and regroup", traits: { support: 2, balance: 1 } }
    ]
  },
  {
    text: "At a party, you're most likely to be…",
    options: [
      { label: "The center of attention telling stories", traits: { attack: 2, balance: 1 } },
      { label: "The one making sure everyone's having a good time", traits: { support: 2, defend: 1 } },
      { label: "Sneaking around pulling harmless pranks", traits: { speed: 2, attack: 1 } },
      { label: "Chilling on the couch, vibing", traits: { defend: 2, balance: 1 } }
    ]
  },
  {
    text: "Which word resonates with you most?",
    options: [
      { label: "Power", traits: { attack: 3 } },
      { label: "Harmony", traits: { support: 3 } },
      { label: "Freedom", traits: { speed: 3 } },
      { label: "Resilience", traits: { defend: 3 } }
    ]
  },
  {
    text: "Your ideal superpower would be…",
    options: [
      { label: "Raw elemental power — fire, lightning, etc.", traits: { attack: 3 } },
      { label: "An unbreakable shield to protect everyone", traits: { defend: 3 } },
      { label: "Teleportation — be anywhere instantly", traits: { speed: 3 } },
      { label: "Healing — keep people safe and healthy", traits: { support: 3 } }
    ]
  },
  {
    text: "It's the final stretch — Zapdos just spawned. What's your move?",
    options: [
      { label: "Rush in and try to steal it — high risk, high reward", traits: { attack: 2, speed: 1 } },
      { label: "Zone out the enemies so my team can secure it", traits: { defend: 2, balance: 1 } },
      { label: "Sneak around back and ambush whoever's low HP", traits: { speed: 2, attack: 1 } },
      { label: "Stick with my team and buff them for the fight", traits: { support: 2, balance: 1 } }
    ]
  },
  {
    text: "How do you handle pressure?",
    options: [
      { label: "I thrive on it — pressure makes diamonds", traits: { attack: 2, balance: 1 } },
      { label: "I stay calm and keep everyone steady", traits: { defend: 2, support: 1 } },
      { label: "I adapt quickly and think on my feet", traits: { speed: 2, balance: 1 } },
      { label: "I focus on what I can control and stay balanced", traits: { balance: 2, support: 1 } }
    ]
  }
];

const CHARACTERS = {
  attack: {
    name: "Pikachu",
    img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png",
    role: "Attacker",
    desc: "You're electric — literally! Like Pikachu, you light up every room (and every team fight). You've got a natural spark that draws people in, and when it's time to perform, you bring the thunder. You're not afraid to take the spotlight and carry the team on your back.",
    traits: ["High Energy", "Crowd Favorite", "Clutch Player", "Bold", "Expressive"]
  },
  defend: {
    name: "Snorlax",
    img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/143.png",
    role: "Defender",
    desc: "Unshakeable. Like Snorlax, you're the rock your friends lean on — calm under pressure, impossibly loyal, and way tougher than you look. You might seem laid-back, but when it counts, nothing gets past you. Your strength is your steady, protective presence.",
    traits: ["Loyal", "Chill", "Protective", "Dependable", "Unshakeable"]
  },
  speed: {
    name: "Gengar",
    img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/94.png",
    role: "Speedster",
    desc: "Sneaky, clever, and always one step ahead — that's you, Gengar. You love keeping people on their toes with your quick wit and unpredictable energy. You thrive on the element of surprise and have a mischievous streak that makes life way more fun.",
    traits: ["Witty", "Unpredictable", "Quick-Thinker", "Mischievous", "Creative"]
  },
  support: {
    name: "Eldegoss",
    img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/830.png",
    role: "Supporter",
    desc: "You're the heart of the team. Like Eldegoss, you quietly lift everyone around you — healing, encouraging, and making sure no one gets left behind. People might underestimate you, but your team knows: without you, everything falls apart. Your empathy is your superpower.",
    traits: ["Empathetic", "Nurturing", "Team Player", "Selfless", "Perceptive"]
  },
  balance: {
    name: "Lucario",
    img: "https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/448.png",
    role: "All-Rounder",
    desc: "Disciplined, versatile, and driven — you're Lucario. You don't just rely on one strength; you've worked hard to be good at everything. You lead by example with quiet determination and can adapt to any situation. You're the one people trust to get the job done, no matter what.",
    traits: ["Disciplined", "Versatile", "Determined", "Balanced", "Leader"]
  }
};

let currentQ = 0;
const scores = { attack: 0, defend: 0, speed: 0, support: 0, balance: 0 };

function show(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  const el = document.getElementById(id);
  el.classList.remove('active');
  void el.offsetWidth;
  el.classList.add('active');
}

function startQuiz() {
  currentQ = 0;
  Object.keys(scores).forEach(k => scores[k] = 0);
  show('quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = QUESTIONS[currentQ];
  const pct = Math.round((currentQ / QUESTIONS.length) * 100);
  document.getElementById('prog-label').textContent = `Question ${currentQ + 1} of ${QUESTIONS.length}`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-fill').style.width = `${pct}%`;

  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'fadeUp .4s ease';

  card.innerHTML = `
    <div class="question-num">Question ${currentQ + 1}</div>
    <div class="question-text">${q.text}</div>
    <div class="options">
      ${q.options.map((o, i) => `<button class="option-btn" onclick="selectOption(${i})">${o.label}</button>`).join('')}
    </div>
  `;
}

function selectOption(idx) {
  const btns = document.querySelectorAll('.option-btn');
  btns.forEach(b => { b.classList.remove('selected'); b.disabled = true; });
  btns[idx].classList.add('selected');

  const traits = QUESTIONS[currentQ].options[idx].traits;
  Object.entries(traits).forEach(([k, v]) => { scores[k] = (scores[k] || 0) + v; });

  setTimeout(() => {
    currentQ++;
    if (currentQ < QUESTIONS.length) {
      renderQuestion();
    } else {
      showResult();
    }
  }, 500);
}

function showResult() {
  const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const char = CHARACTERS[winner];

  document.getElementById('prog-fill').style.width = '100%';
  document.getElementById('prog-pct').textContent = '100%';

  const resultDiv = document.getElementById('result');
  resultDiv.innerHTML = `
    <div class="result-card">
      <div class="result-label">You are</div>
      <div class="result-sprite"><img src="${char.img}" alt="${char.name}"></div>
      <div class="result-name">${char.name}</div>
      <div class="result-role">${char.role}</div>
      <p class="result-desc">${char.desc}</p>
      <div class="trait-chips">
        ${char.traits.map(t => `<span class="chip">${t}</span>`).join('')}
      </div>
      <button class="btn-outline" onclick="startQuiz()">
        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 2.13-9.36L1 10"/></svg>
        Retake Quiz
      </button>
      <div class="share-row">
        <button class="share-btn copy" onclick="copyResult()">📋 Copy Result</button>
      </div>
    </div>
  `;

  show('result');
}

function copyResult() {
  const winner = Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  const char = CHARACTERS[winner];
  const text = `I got ${char.name} (${char.role}) in the Pokémon UNITE personality quiz! ${char.emoji}`;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.share-btn.copy');
    btn.textContent = '✅ Copied!';
    setTimeout(() => { btn.textContent = '📋 Copy Result'; }, 2000);
  });
}
</script>

</body>
</html>
